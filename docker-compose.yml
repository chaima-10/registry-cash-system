version: '3.8'

services:
  db:
    image: mysql:8.0.36  # Specific version instead of latest
    container_name: registry_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: registry_cash_db
      MYSQL_USER: registry_user
      MYSQL_PASSWORD: registry_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  backend:
    # Using your actual backend image name
    image: registry-cash-system-backend:1.0.0
    container_name: registry_backend
    ports:
      - "5001:5000"
    environment:
      # Connects to the local 'db' service created above
      - DATABASE_URL=mysql://registry_user:registry_password@db:3306/registry_cash_db
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_dev_key}
      - PORT=5000
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    # Using your actual frontend image name
    image: registry-cash-system-frontend:1.0.0
    container_name: registry_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
