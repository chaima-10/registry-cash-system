name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  frontend-build-test:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Tests
        run: npm run test --if-present

  backend-build-test:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Tests
        run: npm run test --if-present

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [frontend-build-test, backend-build-test]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Frontend Image
        run: |
          cd frontend
          docker build -t registry-cash-system-frontend:${{ github.sha }} .
          # Uncomment below to push to GitHub Container Registry (ghcr.io)
          # echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          # docker tag registry-cash-system-frontend:${{ github.sha }} ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          # docker push ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}

      - name: Build Backend Image
        run: |
          cd backend
          docker build -t registry-cash-system-backend:${{ github.sha }} .
          # Uncomment below to push to GitHub Container Registry (ghcr.io)
          # docker tag registry-cash-system-backend:${{ github.sha }} ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          # docker push ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
